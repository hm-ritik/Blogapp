db:
    image: postgres:15
    container_name: postgres_dba
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blogdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: fastapi_app
    depends_on:
      db:
        condition: service_healthy 
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/blogdb
